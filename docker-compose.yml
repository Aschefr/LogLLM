version: '3.8'

services:
  logllm:
    build: .
    container_name: logllm
    ports:
      - "8080:8080"
    volumes:
      - ./appdata:/app/appdata
      - ./logs:/logs
    restart: unless-stopped
    networks:
      - logllm-network

  # Optional: Ollama service for local LLM
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - logllm-network

networks:
  logllm-network:
    driver: bridge

volumes:
  ollama_data:
